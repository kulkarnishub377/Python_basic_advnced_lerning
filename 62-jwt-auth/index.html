<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth Dashboard</title>
    <style>
        :root {
            --bg: #0f172a; --text: #f8fafc; --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6; --primary-hover: #2563eb;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* Glassmorphism Card */
        .glass-card {
            background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        h1 { margin-bottom: 8px; }
        p.subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #cbd5e1; }
        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
            border-radius: 8px; color: white; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); margin-top: 10px; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; }
        
        /* Dashboard Screen */
        .hidden { display: none !important; }
        .dashboard-info { background: rgba(0,0,0,0.3); padding: 16px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        .token-display { margin-top: 10px; font-family: monospace; font-size: 0.75rem; color: #64748b; word-break: break-all; }
    </style>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-screen" class="glass-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to receive your JWT token</p>

        <form id="login-form">
            <div class="form-group">
                <label>Email (Username)</label>
                <input type="text" id="username" placeholder="john@example.com" value="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="secret" value="secret" required>
            </div>
            <button type="submit" class="btn">Authenticatate</button>
            <div id="auth-error" class="error">Invalid username or password</div>
        </form>
    </div>

    <!-- Protected Dashboard Screen -->
    <div id="dashboard-screen" class="glass-card hidden">
        <h1>Secured Vault 🔒</h1>
        <p class="subtitle">You successfully accessed a protected route!</p>
        
        <div class="dashboard-info" id="user-info">
            Loading user profile from API...
        </div>

        <button id="btn-logout" class="btn btn-outline">Log Out (Clear Token)</button>

        <p class="token-display"><strong>Your Local Storage JWT:</strong><br><span id="raw-token"></span></p>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        
        // Screens
        const authScreen = document.getElementById('auth-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const errBox = document.getElementById('auth-error');

        // Check if token already exists on page load
        if (localStorage.getItem('token')) {
            showDashboard();
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.style.display = 'none';
            
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // FastAPI OAuth2PasswordRequestForm expects x-www-form-urlencoded
            const formData = new URLSearchParams();
            formData.append('username', u);
            formData.append('password', p);

            try {
                const response = await fetch(`${API_BASE}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    showDashboard();
                } else {
                    errBox.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errBox.style.display = 'block';
                errBox.innerText = "Connection failed. Is Uvicorn running?";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('token');
            authScreen.classList.remove('hidden');
            dashboardScreen.classList.add('hidden');
        });

        async function showDashboard() {
            authScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            
            const token = localStorage.getItem('token');
            document.getElementById('raw-token').innerText = token.substring(0, 30) + '...';

            // Fetch protected /users/me endpoint
            try {
                const response = await fetch(`${API_BASE}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('user-info').innerHTML = `
                        <strong>Name:</strong> ${user.full_name} <br>
                        <strong>Email:</strong> ${user.username} <br>
                        <strong>Status:</strong> ${user.is_active ? 'Active 🟢' : 'Inactive 🔴'}
                    `;
                } else {
                    // Token expired or invalid
                    document.getElementById('user-info').innerHTML = `
                        <span class="error" style="display:block">Session expired. Please log in again.</span>
                    `;
                    setTimeout(() => document.getElementById('btn-logout').click(), 2000);
                }
            } catch (err) {
                console.error("Failed to fetch user data", err);
            }
        }
    </script>
</body>
</html>
