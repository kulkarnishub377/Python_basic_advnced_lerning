<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis Cache Inspector</title>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --hit:#22c55e; --miss:#ef4444; --accent:#3b82f6; }
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
        body{background:var(--bg);color:var(--text);padding:30px;display:flex;flex-direction:column;align-items:center;}
        .container{max-width:800px;width:100%;}
        h1{text-align:center;margin-bottom:8px;color:var(--accent);}
        p.sub{text-align:center;color:#94a3b8;margin-bottom:30px;}
        .controls{display:flex;gap:12px;margin-bottom:25px;justify-content:center;}
        button{padding:12px 24px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;transition:.2s;font-size:1rem;}
        .btn-get{background:var(--accent);color:#fff;}
        .btn-post{background:#f59e0b;color:#000;}
        button:hover{filter:brightness(1.15);transform:translateY(-2px);}
        .metrics{display:flex;gap:15px;margin-bottom:25px;}
        .metric{flex:1;background:var(--card);padding:18px;border-radius:10px;text-align:center;border:1px solid #334155;}
        .metric .val{font-size:2rem;font-weight:bold;}
        .metric .label{font-size:.8rem;color:#94a3b8;margin-top:4px;}
        .hit .val{color:var(--hit);}
        .miss .val{color:var(--miss);}
        .result{background:var(--card);border-radius:12px;padding:20px;border:1px solid #334155;}
        pre{background:#000;padding:15px;border-radius:8px;overflow-x:auto;color:#a5b4fc;font-size:.9rem;min-height:120px;}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.85rem;font-weight:bold;margin-bottom:10px;}
        .badge-hit{background:rgba(34,197,94,.15);color:var(--hit);border:1px solid var(--hit);}
        .badge-miss{background:rgba(239,68,68,.15);color:var(--miss);border:1px solid var(--miss);}
    </style>
</head>
<body>
<div class="container">
    <h1>Redis Cache Inspector</h1>
    <p class="sub">Watch how Redis caching dramatically reduces API response times</p>

    <div class="controls">
        <button class="btn-get" onclick="fetchProducts()">GET /products</button>
        <button class="btn-post" onclick="addProduct()">POST /products (Invalidate Cache)</button>
    </div>

    <div class="metrics">
        <div class="metric hit"><div class="val" id="hits">0</div><div class="label">Cache HITs</div></div>
        <div class="metric miss"><div class="val" id="misses">0</div><div class="label">Cache MISSes</div></div>
        <div class="metric"><div class="val" id="time">--</div><div class="label">Last Response (ms)</div></div>
    </div>

    <div class="result">
        <span class="badge" id="badge" style="display:none;"></span>
        <pre id="output">Click "GET /products" to start the demo...</pre>
    </div>
</div>
<script>
    const API='http://127.0.0.1:8000';
    let hits=0,misses=0;

    async function fetchProducts(){
        const out=document.getElementById('output');
        out.textContent='Loading...';
        try{
            const res=await fetch(`${API}/products`);
            const data=await res.json();
            out.textContent=JSON.stringify(data,null,2);
            document.getElementById('time').textContent=data.response_time_ms;
            const badge=document.getElementById('badge');
            badge.style.display='inline-block';
            if(data.source==='redis_cache'){
                hits++;badge.className='badge badge-hit';badge.textContent='CACHE HIT';
            }else{
                misses++;badge.className='badge badge-miss';badge.textContent='CACHE MISS';
            }
            document.getElementById('hits').textContent=hits;
            document.getElementById('misses').textContent=misses;
        }catch(e){out.textContent='Error: '+e.message;}
    }

    async function addProduct(){
        const out=document.getElementById('output');
        out.textContent='Creating product & invalidating cache...';
        try{
            const res=await fetch(`${API}/products`,{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({name:'Widget '+Math.floor(Math.random()*1000),price:+(Math.random()*100).toFixed(2)})
            });
            const data=await res.json();
            out.textContent=JSON.stringify(data,null,2);
            document.getElementById('badge').style.display='none';
        }catch(e){out.textContent='Error: '+e.message;}
    }
</script>
</body>
</html>
