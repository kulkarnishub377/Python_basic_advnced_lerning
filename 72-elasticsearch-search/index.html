<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Search Engine</title>
    <style>
        :root{--bg:#111827;--card:#1f2937;--text:#f9fafb;--accent:#6366f1;--border:#374151;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
        body{background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:50px 20px;}
        .container{max-width:700px;width:100%;}
        h1{text-align:center;color:var(--accent);margin-bottom:5px;font-size:2rem;}
        p.sub{text-align:center;color:#9ca3af;margin-bottom:30px;}
        .search-box{position:relative;margin-bottom:30px;}
        input{width:100%;padding:16px 20px;font-size:1.1rem;border:2px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);outline:none;transition:.2s;}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.3);}
        .results{display:flex;flex-direction:column;gap:12px;}
        .result-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:.2s;}
        .result-card:hover{border-color:var(--accent);transform:translateX(4px);}
        .result-card h3{margin-bottom:4px;}
        .result-card .meta{display:flex;gap:15px;font-size:.85rem;color:#9ca3af;}
        .badge{display:inline-block;background:rgba(99,102,241,.15);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:.8rem;font-weight:bold;}
        .empty{text-align:center;color:#6b7280;padding:40px;}
    </style>
</head>
<body>
<div class="container">
    <h1>Elastic Search</h1>
    <p class="sub">Type anything. Try typos like "laptp" or "hedphones" -- Elasticsearch handles it.</p>
    <div class="search-box">
        <input id="search" type="text" placeholder="Search products..." autofocus>
    </div>
    <div id="results" class="results">
        <div class="empty">Start typing to search...</div>
    </div>
</div>
<script>
    const API='http://127.0.0.1:8000';
    let timer=null;
    document.getElementById('search').addEventListener('input',e=>{
        clearTimeout(timer);
        timer=setTimeout(()=>doSearch(e.target.value),300);
    });
    async function doSearch(q){
        const box=document.getElementById('results');
        if(!q.trim()){box.innerHTML='<div class="empty">Start typing to search...</div>';return;}
        try{
            const res=await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
            const data=await res.json();
            if(!data.results.length){box.innerHTML='<div class="empty">No results found.</div>';return;}
            box.innerHTML=data.results.map(r=>`
                <div class="result-card">
                    <h3>${r.name}</h3>
                    <div class="meta">
                        <span class="badge">${r.category}</span>
                        <span>$${r.price}</span>
                        <span>Score: ${r.score}</span>
                    </div>
                    <p style="margin-top:8px;font-size:.9rem;color:#d1d5db;">${r.description||''}</p>
                </div>
            `).join('');
        }catch(e){box.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
    }
</script>
</body>
</html>
