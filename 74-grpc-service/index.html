<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gRPC Performance Lab</title>
    <style>
        :root{--bg:#0a0a0a;--card:#171717;--text:#fafafa;--accent:#06b6d4;--green:#22c55e;--border:#262626;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
        body{background:var(--bg);color:var(--text);padding:30px;display:flex;flex-direction:column;align-items:center;}
        .container{max-width:800px;width:100%;}
        h1{text-align:center;color:var(--accent);margin-bottom:5px;}
        p.sub{text-align:center;color:#a3a3a3;margin-bottom:30px;}
        .controls{display:flex;gap:12px;justify-content:center;margin-bottom:25px;flex-wrap:wrap;}
        button{padding:12px 20px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;transition:.2s;font-size:.95rem;}
        .btn-list{background:var(--accent);color:#000;}
        .btn-create{background:var(--green);color:#000;}
        .btn-bench{background:#8b5cf6;color:#fff;}
        button:hover{filter:brightness(1.15);transform:translateY(-2px);}
        .bench-result{display:flex;gap:15px;margin-bottom:25px;}
        .bench-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center;}
        .bench-card .val{font-size:2rem;font-weight:bold;color:var(--accent);}
        .bench-card .label{font-size:.8rem;color:#a3a3a3;margin-top:4px;}
        .result{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
        pre{background:#000;padding:15px;border-radius:8px;overflow-x:auto;color:#a5b4fc;font-size:.9rem;min-height:120px;}
    </style>
</head>
<body>
<div class="container">
    <h1>gRPC Performance Lab</h1>
    <p class="sub">All browser requests go through the REST Proxy, which internally calls the gRPC server using binary Protocol Buffers</p>
    <div class="controls">
        <button class="btn-list" onclick="listProducts()">List Products (gRPC)</button>
        <button class="btn-create" onclick="createProduct()">Create Random Product</button>
        <button class="btn-bench" onclick="runBenchmark()">Benchmark 100 Calls</button>
    </div>
    <div class="bench-result" id="bench" style="display:none;">
        <div class="bench-card"><div class="val" id="b-calls">-</div><div class="label">gRPC Calls</div></div>
        <div class="bench-card"><div class="val" id="b-total">-</div><div class="label">Total (ms)</div></div>
        <div class="bench-card"><div class="val" id="b-avg">-</div><div class="label">Avg per Call (ms)</div></div>
    </div>
    <div class="result"><pre id="output">Click a button above to interact with the gRPC backend...</pre></div>
</div>
<script>
    const API='http://127.0.0.1:8000';
    const out=()=>document.getElementById('output');
    async function listProducts(){
        out().textContent='Fetching via gRPC proxy...';
        try{const r=await fetch(`${API}/products`);out().textContent=JSON.stringify(await r.json(),null,2);}
        catch(e){out().textContent='Error: '+e.message;}
    }
    async function createProduct(){
        out().textContent='Creating product via gRPC...';
        try{const r=await fetch(`${API}/products`,{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({name:'Item-'+Math.floor(Math.random()*9999),price:+(Math.random()*500).toFixed(2)})});
            out().textContent=JSON.stringify(await r.json(),null,2);}
        catch(e){out().textContent='Error: '+e.message;}
    }
    async function runBenchmark(){
        out().textContent='Running 100 gRPC round-trips...';
        document.getElementById('bench').style.display='flex';
        try{const r=await fetch(`${API}/benchmark/100`);const d=await r.json();
            document.getElementById('b-calls').textContent=d.calls;
            document.getElementById('b-total').textContent=d.total_ms;
            document.getElementById('b-avg').textContent=d.avg_ms;
            out().textContent=JSON.stringify(d,null,2);}
        catch(e){out().textContent='Error: '+e.message;}
    }
</script>
</body>
</html>
