<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Playwright Web Scraper</title>
    <style>
        :root{--bg:#0c0a09;--card:#1c1917;--text:#fafaf9;--accent:#2EAD33;--border:#292524;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
        body{background:var(--bg);color:var(--text);padding:30px;display:flex;flex-direction:column;align-items:center;}
        .container{max-width:750px;width:100%;}
        h1{text-align:center;color:var(--accent);margin-bottom:25px;}
        .input-row{display:flex;gap:10px;margin-bottom:25px;}
        input{flex:1;padding:14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:1rem;outline:none;}
        input:focus{border-color:var(--accent);}
        button{padding:14px 22px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
        .results{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
        .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
        .stat .val{font-size:1.5rem;font-weight:bold;color:var(--accent);}
        .stat .label{font-size:.8rem;color:#a8a29e;margin-top:4px;}
        .headings{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;}
        .headings h3{margin-bottom:10px;color:var(--accent);}
        .headings ul{list-style:none;padding:0;}
        .headings li{padding:4px 0;border-bottom:1px solid var(--border);font-size:.9rem;}
        pre{background:#000;padding:15px;border-radius:8px;color:#a5b4fc;overflow-x:auto;font-size:.85rem;}
    </style>
</head>
<body>
<div class="container">
    <h1>Playwright Web Scraper</h1>
    <div class="input-row">
        <input id="url" type="text" placeholder="https://example.com" value="https://example.com">
        <button onclick="doScrape()">Scrape</button>
    </div>
    <div class="results" id="stats" style="display:none;">
        <div class="stat"><div class="val" id="s-title">-</div><div class="label">Page Title</div></div>
        <div class="stat"><div class="val" id="s-time">-</div><div class="label">Load Time (ms)</div></div>
        <div class="stat"><div class="val" id="s-words">-</div><div class="label">Word Count</div></div>
        <div class="stat"><div class="val" id="s-links">-</div><div class="label">Links Found</div></div>
    </div>
    <div class="headings" id="headings-box" style="display:none;margin-bottom:20px;">
        <h3>Extracted Headings</h3>
        <ul id="headings-list"></ul>
    </div>
    <pre id="output">Enter a URL and click Scrape...</pre>
</div>
<script>
    const API='http://127.0.0.1:8000';
    async function doScrape(){
        const url=document.getElementById('url').value;
        const out=document.getElementById('output');
        out.textContent='Scraping with headless Chromium...';
        document.getElementById('stats').style.display='none';
        document.getElementById('headings-box').style.display='none';
        try{
            const res=await fetch(`${API}/scrape`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
            const d=await res.json();
            if(!res.ok)throw new Error(d.detail||'Scrape failed');
            out.textContent=JSON.stringify(d,null,2);
            document.getElementById('stats').style.display='grid';
            document.getElementById('s-title').textContent=d.title||'N/A';
            document.getElementById('s-time').textContent=d.load_time_ms;
            document.getElementById('s-words').textContent=d.word_count;
            document.getElementById('s-links').textContent=d.links_count;
            if(d.headings&&d.headings.length){
                document.getElementById('headings-box').style.display='block';
                document.getElementById('headings-list').innerHTML=d.headings.map(h=>`<li>${h}</li>`).join('');
            }
        }catch(e){out.textContent='Error: '+e.message;}
    }
</script>
</body>
</html>
