<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Version Inspector</title>
    <style>
        :root {
            --bg: #1e1e2f; --card: #2a2a40; --text: #e0e0e0;
            --v1: #facc15; --v2: #38bdf8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        h1 { margin-bottom: 30px; }
        
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .btn { padding: 12px 24px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; color: #111; }
        .btn-v1 { background: var(--v1); }
        .btn-v2 { background: var(--v2); }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .dashboard { display: flex; gap: 20px; }
        .panel { flex: 1; background: var(--card); border-radius: 12px; padding: 20px; text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .panel h2 { margin-bottom: 15px; font-size: 1.2rem; }
        .panel-v1 h2 { color: var(--v1); border-bottom: 2px solid var(--v1); padding-bottom: 10px; }
        .panel-v2 h2 { color: var(--v2); border-bottom: 2px solid var(--v2); padding-bottom: 10px; }
        
        pre { background: #111; padding: 15px; border-radius: 8px; overflow-x: auto; color: #a5b4fc; font-size: 0.9rem; min-height: 200px; }
        
    </style>
</head>
<body>

    <div class="container">
        <h1>🔄 API Version Inspector</h1>

        <div class="controls">
            <button class="btn btn-v1" onclick="fetchVersion('v1')">Fetch /api/v1/users</button>
            <button class="btn btn-v2" onclick="fetchVersion('v2')">Fetch /api/v2/users</button>
        </div>

        <div class="dashboard">
            <div class="panel panel-v1">
                <h2>Legacy v1 Schema</h2>
                <pre id="output-v1">Waiting for request...</pre>
            </div>
            
            <div class="panel panel-v2">
                <h2>New v2 Schema</h2>
                <pre id="output-v2">Waiting for request...</pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';

        async function fetchVersion(version) {
            const outElement = document.getElementById(`output-${version}`);
            outElement.textContent = "Fetching...";
            
            try {
                const res = await fetch(`${API_BASE}/api/${version}/users`);
                const data = await res.json();
                
                // Highlight the differences conceptually for the user
                outElement.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                outElement.textContent = `Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
