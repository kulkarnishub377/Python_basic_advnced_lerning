<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostgreSQL + FastAPI Items</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .card { background: var(--card); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #ef4444; padding: 6px 12px; font-size: 0.85rem; }
        .item-list { display: flex; flex-direction: column; gap: 12px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; }
        .item-info h3 { margin: 0 0 4px 0; }
        .item-info p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Inventory Dashboard</h1>
        
        <div class="card">
            <h3>Add New Item</h3>
            <form id="item-form">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" required placeholder="Item name...">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="Brief details (optional)...">
                </div>
                <button type="submit" class="btn">Create Item</button>
            </form>
        </div>

        <div class="card">
            <h3>Current Inventory</h3>
            <div id="item-list" class="item-list">
                <!-- Items injected here by JS -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/items/';

        async function fetchItems() {
            try {
                const res = await fetch(API_URL);
                const items = await res.json();
                renderItems(items);
            } catch (err) { console.error("Error fetching items", err); }
        }

        function renderItems(items) {
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            if (items.length === 0) {
                list.innerHTML = '<p style="color: #64748b; font-style: italic;">No items found. Add one above!</p>';
                return;
            }
            items.forEach(item => {
                list.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <h3>${item.title}</h3>
                            <p>${item.description || 'No description provided'}</p>
                        </div>
                        <button class="btn btn-danger" onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                `;
            });
        }

        document.getElementById('item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const desc = document.getElementById('description').value;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description: desc, is_active: true })
                });
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                fetchItems();
            } catch (err) { console.error("Error creating item", err); }
        });

        async function deleteItem(id) {
            try {
                await fetch(API_URL + id, { method: 'DELETE' });
                fetchItems();
            } catch (err) { console.error("Error deleting item", err); }
        }

        // Init
        fetchItems();
    </script>
</body>
</html>
